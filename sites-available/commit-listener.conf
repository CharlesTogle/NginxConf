# Commit Listener — webhook receiver for GitHub + Linear
# Public URL: https://charles.auroch-kingsnake.ts.net/webhook/
# Internal URL: http://commit.charles.home
#
# Update webhook URLs in GitHub and Linear to:
#   https://charles.auroch-kingsnake.ts.net/webhook/github
#   https://charles.auroch-kingsnake.ts.net/webhook/linear

# Internal access via home DNS
server {
    listen 100.116.210.110:80;
    listen 127.0.0.1:80;
    server_name commit.charles.home;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
