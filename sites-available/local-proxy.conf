server {
    listen 100.116.210.110:80;
    listen 127.0.0.1:80;
    server_name chat.charles.home;

    location / {
        proxy_pass http://127.0.0.1:4096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 100.116.210.110:80;
    listen 127.0.0.1:80;
    server_name drive.charles.home;
    client_max_body_size 0;

    root /home/charles/home/HomeServer-Lite/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 100.116.210.110:80;
    listen 127.0.0.1:80;
    server_name charles.auroch-kingsnake.ts.net;

    location = /chat {
        return 301 /chat/;
    }

    location /chat/ {
        rewrite ^/chat/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4096;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /drive {
        return 301 /drive/;
    }

    location /drive/ {
        rewrite ^/drive/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host drive.charles.home;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 100.116.210.110:443 ssl;
    server_name charles.auroch-kingsnake.ts.net;

    ssl_certificate /etc/nginx/certs/charles.auroch-kingsnake.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/charles.auroch-kingsnake.ts.net.key;

    location = /chat {
        return 301 /chat/;
    }

    location /chat/ {
        rewrite ^/chat/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4096;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /drive {
        return 301 /drive/;
    }

    location /drive/ {
        rewrite ^/drive/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host drive.charles.home;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
