server {
    listen 127.0.0.1:80;
    server_name localhost;

    allow 127.0.0.0/8;
    allow ::1;
    deny all;

    location /ServerBash {
        proxy_pass http://127.0.0.1:4096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
